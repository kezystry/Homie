# Desktop — Homie's hands on the main PC (media playback control, safe by allowlist).
#
# Control is a FIXED set of safe media verbs (the security ruling): each actuator maps to one
# xdotool keystroke into the focused kiosk window. There is no general-exec or free-string
# launch actuator here — those don't exist by construction (core/desktop.py).

[tile]
name = "desktop"
summary = "See and control the main PC — Stremio/media playback (play/pause, skip, seek)."

[subscribes]
# desktop.control carries owner-typed /commands (e.g. /close) into the capability-gated act path.
events = ["desktop.control"]

[provides]
intents = ["pause", "play", "skip", "next episode", "close"]

[[provides.functions]]
name = "play_pause"
description = "Toggle play/pause of whatever is playing on the main PC (e.g. Stremio)."

[[provides.functions]]
name = "next_"
description = "Skip to the next item (next episode / next track)."

[[provides.functions]]
name = "previous"
description = "Go to the previous item."

[[provides.functions]]
name = "skip_forward"
description = "Seek forward a little in what's playing."

[[provides.functions]]
name = "skip_back"
description = "Seek backward a little in what's playing."

[[provides.functions]]
name = "close"
description = "Close a window on the main PC: the active window, or a named app like Stremio."
[[provides.functions.params]]
name = "app"
type = "string"
description = "Optional app to close (e.g. 'stremio'); omit to close the focused window."
required = false

[acts]
actuators = [
    "desktop.play_pause",
    "desktop.next",
    "desktop.prev",
    "desktop.seek_fwd",
    "desktop.seek_back",
    "desktop.stop",
    "desktop.close",
]

[permissions]
reads = ["media"]
network = "local"
